name: CD VPS Docker

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/gkx-api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME  }}/gkx-api:${{ github.sha }}
            ghcr.io/${{ secrets.GHCR_USERNAME  }}/gkx-api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/gkx-web-app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME  }}/gkx-web-app:${{ github.sha }}
            ghcr.io/${{ secrets.GHCR_USERNAME  }}/gkx-web-app:latest

      - name: Deploy in VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose --env-file .env.vps pull
            IMAGE_TAG=${{ github.sha }} docker compose --env-file .env.vps up -d --remove-orphans
            docker image prune -f
