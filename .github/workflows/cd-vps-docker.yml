name: CD VPS Docker

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/gkx-api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME  }}/gkx-api:${{ github.sha }}
            ghcr.io/${{ secrets.GHCR_USERNAME  }}/gkx-api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/gkx-web-app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME  }}/gkx-web-app:${{ github.sha }}
            ghcr.io/${{ secrets.GHCR_USERNAME  }}/gkx-web-app:latest

      - name: Deploy in VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            echo "Checking .env.vps..."
            if [ ! -f .env.vps ]; then
              echo "ERROR: .env.vps not found!"
              exit 1
            fi
            grep -E "GHCR_OWNER|DB_HOST" .env.vps || echo "WARNING: Some required variables missing"

            export IMAGE_TAG=${{ github.sha }}
            docker compose --env-file .env.vps pull

            echo "Checking available services..."
            docker compose --env-file .env.vps config --services

            echo "Running database migrations..."
            docker run --rm \
              --env-file .env.vps \
              --network host \
              ghcr.io/${{ secrets.GHCR_USERNAME }}/gkx-api:${{ github.sha }} \
              npm run migration:run || {
              echo "ERROR: Migrations failed."
              exit 1
            }

            echo "Starting services..."
            docker compose --env-file .env.vps up -d --remove-orphans
            docker compose --env-file .env.vps ps

            API_STATUS="$(docker inspect --format='{{.State.Status}}' gkx-api 2>/dev/null || echo not-found)"
            API_HEALTH="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' gkx-api 2>/dev/null || echo not-found)"
            echo "gkx-api status: $API_STATUS"
            echo "gkx-api health: $API_HEALTH"

            if [ "$API_STATUS" != "running" ] || [ "$API_HEALTH" = "unhealthy" ] || [ "$API_HEALTH" = "not-found" ]; then
              echo "gkx-api is not healthy. Printing diagnostic logs..."
              docker logs --tail 300 gkx-api || true
              docker compose --env-file .env.vps logs --no-color --tail 300 gkx-api || true
              docker logs --tail 300 gkx-migrations || true
              exit 1
            fi

            docker image prune -f
