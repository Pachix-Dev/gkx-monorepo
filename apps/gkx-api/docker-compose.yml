services:
  postgres:
    image: postgres:16
    container_name: gkx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gkx_user
      POSTGRES_PASSWORD: gkx_pass
      POSTGRES_DB: gkx_db
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gkx_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gkx.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_DEFAULT_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  pg_data:
